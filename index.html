<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente CEPAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f6; }
        #chat-container { border: 2px solid #004a99; border-radius: 12px; overflow: hidden; background: white; display: flex; flex-direction: column; height: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #header { background: #004a99; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; }
        #box { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 14px; background: #fff; }
        #input-area { display: flex; border-top: 1px solid #eee; padding: 10px; background: #f9f9f9; }
        input { flex-grow: 1; border: 1px solid #ccc; padding: 10px; border-radius: 6px; outline: none; }
        button { margin-left: 8px; background: #004a99; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #003366; }
        .msg-ia { color: #004a99; margin-top: 8px; border-left: 3px solid #004a99; padding-left: 8px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">Asistente del Curso - Envejecimiento</div>
        <div id="box"><div><em>Bienvenido. ¿Qué duda tienes sobre los contenidos del curso?</em></div></div>
        <div id="input-area">
            <input type="text" id="q" placeholder="Escribe tu pregunta aquí...">
            <button id="btn">Enviar</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const API_KEY = "AIzaSyDl9bsBjAeHxvpAJgJ44lKZzY-gNSjzVwQ"; // Reemplaza por tu Key activa
        const SB_URL = "https://vvmsvhoosmgtfmhtzcvt.supabase.co";
        const SB_KEY = "sb_publishable_stfZcL7DEI4mat1A4e7O0g_JTAaBahC";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('btn').onclick = async () => {
            const input = document.getElementById('q');
            const box = document.getElementById('box');
            const pregunta = input.value;
            if(!pregunta) return;

            box.innerHTML += `<div style="margin-top:10px;"><strong>Tú:</strong> ${pregunta}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                // 1. GENERAR VECTOR (Embedding)
                // Usamos text-embedding-004 que es el que soporta 3072 dimensiones perfectamente
                const resV = await fetch(`https://generativelanguage.googleapis.com/v1/models/text-embedding-004:embedContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        content: { parts: [{ text: pregunta }] }, 
                        outputDimensionality: 3072 
                    })
                });
                
                if (!resV.ok) {
                    const errorV = await resV.json();
                    throw new Error(`Error en Embedding: ${errorV.error.message}`);
                }
                
                const dataV = await resV.json();
                const vector = dataV.embedding.values;

                // 2. BUSCAR EN SUPABASE
                const { data: docs, error: errSb } = await supabaseClient.rpc('match_documentos_curso', {
                    query_embedding: vector,
                    match_threshold: 0.3,
                    match_count: 3
                });

                if (errSb) throw new Error(`Error en Supabase: ${errSb.message}`);

                const contexto = docs.map(d => d.contenido).join("\n");

                // 3. GENERAR RESPUESTA (Gemini 1.5 Flash)
                const resG = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `Eres un asistente experto para este curso sobre envejecimiento de la CEPAL. Responde de forma clara usando este contexto:\n${contexto}\n\nPregunta: ${pregunta}` }] }] 
                    })
                });

                if (!resG.ok) {
                    const errorG = await resG.json();
                    throw new Error(`Error en Gemini: ${errorG.error.message}`);
                }

                const dataG = await resG.json();
                const respuesta = dataG.candidates[0].content.parts[0].text;

                box.innerHTML += `<div class="msg-ia"><strong>Asistente:</strong> ${respuesta}</div>`;
                box.scrollTop = box.scrollHeight;

            } catch (e) {
                console.error(e);
                box.innerHTML += `<div style="color:red; font-size:12px; margin-top:5px;">⚠️ ${e.message}</div>`;
            }
        };
    </script>
</body>
</html>
