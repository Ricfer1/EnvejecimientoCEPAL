<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f6; }
        #chat-container { border: 1px solid #004a99; border-radius: 8px; overflow: hidden; background: white; display: flex; flex-direction: column; height: 500px; }
        #header { background: #004a99; color: white; padding: 10px; text-align: center; font-weight: bold; }
        #box { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        #input-area { display: flex; border-top: 1px solid #ddd; padding: 10px; background: #eee; }
        input { flex-grow: 1; border: 1px solid #ccc; padding: 8px; border-radius: 4px; }
        button { margin-left: 5px; background: #004a99; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">Asistente del Curso</div>
        <div id="box"><div><em>Bienvenido. Haz una pregunta sobre el curso.</em></div></div>
        <div id="input-area">
            <input type="text" id="q" placeholder="Escribe aquí...">
            <button id="btn">Enviar</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDl9bsBjAeHxvpAJgJ44lKZzY-gNSjzVwQ"; 
        const SB_URL = "https://vvmsvhoosmgtfmhtzcvt.supabase.co";
        const SB_KEY = "sb_publishable_stfZcL7DEI4mat1A4e7O0g_JTAaBahC";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('btn').onclick = async () => {
            const txt = document.getElementById('q').value;
            const box = document.getElementById('box');
            if(!txt) return;

            box.innerHTML += `<div><strong>Tú:</strong> ${txt}</div>`;
            document.getElementById('q').value = '';

            try {
                // 1. Vector (Embedding 001 como en tu Python)
                const resV = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: { parts: [{ text: txt }] }, outputDimensionality: 3072 })
                });
                const dataV = await resV.json();
                const vec = dataV.embedding.values;

                // 2. Búsqueda
                const { data: docs } = await supabaseClient.rpc('match_documentos_curso', {
                    query_embedding: vec,
                    match_threshold: 0.3,
                    match_count: 3
                });

                const ctx = docs.map(d => d.contenido).join("\n");

                // 3. Respuesta Gemini 1.5 Flash
                const resG = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Responde basado en: ${ctx}\n\nPregunta: ${txt}` }] }] })
                });
                const dataG = await resG.json();
                const respuesta = dataG.candidates[0].content.parts[0].text;

                box.innerHTML += `<div style="color:#004a99; margin-top:10px;"><strong>IA:</strong> ${respuesta}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                box.innerHTML += `<div style="color:red">Error de conexión. Revisa tu API Key.</div>`;
            }
        };
    </script>
</body>
</html>
